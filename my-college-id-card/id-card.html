<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My College Id Card</title>
    <link rel="stylesheet" href="style.css">
   
</head>
 
<body>
    <div class="card-container">
        <div class="id-card">

             <!-- Header Section -->
            <header class="card-header">
                <img src="image/College logo.jpeg"alt="college logo"class="logo"/>
                <p>V.M.L.G College </p>

            </header>
           
      <div class="photo-wrap">
          <div>
              <img src="image/myprofile.png" width="120"alt="profile photo"class="photo"/>
        </div>
     </div>


   <!--main of this-->
  <main class="card-body">
      <div class="name-section">
          <h2 class="student-name">Anushka Sikarwar</h2>
            <p class="college">V.M.L.G College</p>
      </div>
    <hr class="divider ">

     <div class="details">
         <p><strong>Course:</strong>BCA</p>
         <p><strong>Birthdate::</strong>25-08-2025</p>
     </div>

     <div class="id-line">
          <span class="id-lable">ID-NO:</span>
          <span class="id-value">ID-VALUE</span>
     </div>
    <div class="barcode"></div>

  </main>
  <!-- footer of this -->
  <footer class="card-fotter">
    <p class="footer-text">Issued by: College</p>
  </footer>

 </div>
  </div>
</body>
</html>
